        start_date: 2019-08-01
        end_date: 2021-12-01
        highlights:
          - Developed robust quadrotor controllers (PID, LQR, MPC, disturbance-observer-based) for trajectory tracking under wind gusts; validated in Gazebo and on hardware.
          - "Results published in IET Control Theory & Applications (2024) and IEEE Access (2022)."

