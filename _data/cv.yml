    Experience:
      - company: West Virginia University — Robotics Lab
        position: Graduate Research Assistant, Ph.D. Candidate
        location: Morgantown, WV
        start_date: 2023-01-01
        summary: Lead UAV autonomy research on a DOE-funded program for autonomous inspection of coal-ash and tailings dams, owning the planning, perception-aware mapping, and onboard replanning stack.
        highlights:
          - Designed a multi-resolution motion planner (A*/RRT* on octrees, OMPL, Open3D) generating collision-free tunnel corridors for UAV inspection; published at ICUAS 2025.
          - Built a photogrammetry-aware coverage planner enforcing GSD, image-overlap, row-spacing, and view-geometry constraints; published at ICUAS 2024.
          - Engineered real-time online replanning with hazard detection and return-to-home (RTH) logic for battery-swap missions over large sites.
          - Training PPO policies in NVIDIA Isaac Lab for autonomous next-best-view (NBV) planning on raw point clouds (ongoing).
          - Developing real-time state estimation fusing visual odometry with GNSS/IMU in factor graphs (GTSAM) (ongoing).

      - company: University of São Paulo — Center for Robotics (CROB)
        position: Graduate Researcher, M.Sc. Electrical Engineering
